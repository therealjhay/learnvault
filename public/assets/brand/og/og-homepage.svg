    <path d="M28 8 L44 14 L44 30 C44 39 37 47 28 50 C19 47 12 39 12 30 L12 14 Z"
          fill="none" stroke="url(#accent)" stroke-width="0.75" opacity="0.5"/>
    <rect x="21" y="26" width="14" height="9" rx="1.5" fill="url(#accent)" opacity="0.9"/>
    <polygon points="28,18 38,23 28,28 18,23" fill="url(#accent)"/>
    <line x1="38" y1="23" x2="38" y2="30" stroke="url(#accent)" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="38" cy="31" r="1.5" fill="#00ff80"/>
  </g>

  <!-- Center content -->
  <text x="600" y="220" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="800" letter-spacing="-2" fill="white">LearnVault</text>

  <!-- Gradient underline -->
  <rect x="340" y="238" width="520" height="3" rx="2" fill="url(#accent)" opacity="0.7"/>

  <!-- Tagline -->
  <text x="600" y="310" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="400" fill="white" opacity="0.7">Learning is the proof of work.</text>
  <text x="600" y="348" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="400" fill="white" opacity="0.7">The community is the bank.</text>

  <!-- Pill badges -->
  <rect x="310" y="400" width="160" height="40" rx="20" fill="#00d2ff" fill-opacity="0.1" stroke="#00d2ff" stroke-width="1" stroke-opacity="0.5"/>
  <text x="390" y="425" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#00d2ff" letter-spacing="1">LEARN</text>

  <rect x="490" y="400" width="160" height="40" rx="20" fill="#3a7bd5" fill-opacity="0.1" stroke="#3a7bd5" stroke-width="1" stroke-opacity="0.5"/>
  <text x="570" y="425" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#3a7bd5" letter-spacing="1">EARN</text>

  <rect x="670" y="400" width="220" height="40" rx="20" fill="#00ff80" fill-opacity="0.1" stroke="#00ff80" stroke-width="1" stroke-opacity="0.5"/>
  <text x="780" y="425" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#00ff80" letter-spacing="1">GET FUNDED</text>

  <!-- Bottom: Stellar powered -->
  <text x="600" y="560" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="400" fill="white" opacity="0.25" letter-spacing="3">POWERED BY STELLAR · BUILT FOR AFRICAN LEARNERS</text>

  <!-- URL -->
  <text x="600" y="595" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="white" opacity="0.35">learnvault.xyz</text>
