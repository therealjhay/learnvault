<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d2ff"/>
      <stop offset="50%" stop-color="#3a7bd5"/>
      <stop offset="100%" stop-color="#00ff80"/>
    </linearGradient>
    <radialGradient id="glow1" cx="25%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#00d2ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00d2ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#00ff80" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00ff80" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="20%" r="30%">
      <stop offset="0%" stop-color="#3a7bd5" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3a7bd5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <rect width="1200" height="630" fill="url(#glow3)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#00d2ff" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/><line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Border -->
  <rect x="16" y="16" width="1168" height="598" rx="16" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.5"/>

  <!-- Left: Logo icon (large) -->
  <g transform="translate(80, 215) scale(3.2)">
    <path d="M28 2 L50 10 L50 30 C50 42 40 52 28 56 C16 52 6 42 6 30 L6 10 Z"
