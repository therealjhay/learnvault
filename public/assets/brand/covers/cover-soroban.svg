<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070a"/>
      <stop offset="100%" stop-color="#0d0a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8e2de2"/>
      <stop offset="100%" stop-color="#00d2ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#8e2de2" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#8e2de2" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Code-like background decoration -->
  <g opacity="0.06" font-family="monospace" font-size="14" fill="#8e2de2">
    <text x="750" y="100">fn mint_reward(env: Env, learner: Address) {</text>
    <text x="750" y="125">  learner.require_auth();</text>
    <text x="750" y="150">  let balance = get_balance(&amp;env, &amp;learner);</text>
    <text x="750" y="175">  set_balance(&amp;env, &amp;learner, balance + reward);</text>
    <text x="750" y="200">}</text>
    <text x="750" y="250">pub fn verify_milestone(</text>
    <text x="750" y="275">  env: Env,</text>
    <text x="750" y="300">  course_id: u32,</text>
    <text x="750" y="325">  learner: Address,</text>
    <text x="750" y="350">) -&gt; bool {</text>
    <text x="750" y="375">  // on-chain verification</text>
    <text x="750" y="400">}</text>
  </g>

  <!-- Hexagon nodes -->
  <g opacity="0.1" stroke="#8e2de2" stroke-width="1" fill="none">
    <polygon points="1050,200 1080,183 1110,200 1110,234 1080,251 1050,234"/>
    <polygon points="1000,280 1030,263 1060,280 1060,314 1030,331 1000,314"/>
    <polygon points="1100,320 1130,303 1160,320 1160,354 1130,371 1100,354"/>
    <line x1="1080" y1="251" x2="1030" y2="263"/>
    <line x1="1060" y1="314" x2="1100" y2="320"/>
  </g>

  <!-- Track badge -->
  <rect x="60" y="60" width="200" height="36" rx="18" fill="#8e2de2" fill-opacity="0.1" stroke="#8e2de2" stroke-width="1" stroke-opacity="0.6"/>
  <text x="160" y="83" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8e2de2" letter-spacing="2">TRACK 02</text>

  <!-- Title -->
  <text x="60" y="200" font-family="Inter, system-ui, sans-serif" font-size="58" font-weight="800" fill="white" letter-spacing="-1">Soroban Smart</text>
  <text x="60" y="270" font-family="Inter, system-ui, sans-serif" font-size="58" font-weight="800" fill="url(#accent)" letter-spacing="-1">Contracts</text>

  <text x="60" y="340" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="400" fill="white" opacity="0.55">Build and deploy smart contracts on Stellar</text>
  <text x="60" y="368" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="400" fill="white" opacity="0.55">using Rust and the Soroban SDK.</text>

  <g font-family="Inter, system-ui, sans-serif" font-size="14" fill="white" opacity="0.4">
    <text x="60" y="440">12 Modules</text>
    <text x="170" y="440">·</text>
    <text x="185" y="440">Intermediate</text>
    <text x="305" y="440">·</text>
    <text x="320" y="440">Earn LRN</text>
  </g>

  <rect x="0" y="580" width="1200" height="50" fill="url(#accent)" opacity="0.06"/>
  <rect x="0" y="580" width="1200" height="1" fill="url(#accent)" opacity="0.3"/>
  <text x="60" y="612" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" opacity="0.4" letter-spacing="3">LEARNVAULT</text>
  <text x="1140" y="612" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="13" fill="white" opacity="0.25">learnvault.xyz</text>
</svg>
