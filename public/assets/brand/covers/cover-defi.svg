<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070a"/>
      <stop offset="100%" stop-color="#071a0d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff80"/>
      <stop offset="100%" stop-color="#3a7bd5"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#00ff80" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00ff80" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Chart / price curve decoration -->
  <g opacity="0.1" stroke="#00ff80" stroke-width="2" fill="none">
    <polyline points="700,500 750,450 800,470 850,380 900,400 950,300 1000,320 1050,240 1100,260 1150,180 1200,200"/>
  </g>
  <g opacity="0.05" fill="#00ff80">
    <polygon points="700,500 750,450 800,470 850,380 900,400 950,300 1000,320 1050,240 1100,260 1150,180 1200,200 1200,630 700,630"/>
  </g>

  <!-- Coin circles -->
  <g opacity="0.1" stroke="#00ff80" stroke-width="1.5" fill="none">
    <circle cx="1050" cy="150" r="50"/>
    <circle cx="1050" cy="150" r="38"/>
    <text x="1050" y="158" text-anchor="middle" font-family="Inter, monospace" font-size="18" fill="#00ff80" opacity="0.6">$</text>
  </g>
  <g opacity="0.07" stroke="#3a7bd5" stroke-width="1.5" fill="none">
    <circle cx="950" cy="100" r="35"/>
    <circle cx="950" cy="100" r="26"/>
  </g>

  <!-- Track badge -->
  <rect x="60" y="60" width="200" height="36" rx="18" fill="#00ff80" fill-opacity="0.1" stroke="#00ff80" stroke-width="1" stroke-opacity="0.6"/>
  <text x="160" y="83" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#00ff80" letter-spacing="2">TRACK 03</text>

  <!-- Title -->
  <text x="60" y="200" font-family="Inter, system-ui, sans-serif" font-size="58" font-weight="800" fill="white" letter-spacing="-1">DeFi</text>
  <text x="60" y="270" font-family="Inter, system-ui, sans-serif" font-size="58" font-weight="800" fill="url(#accent)" letter-spacing="-1">Fundamentals</text>

  <text x="60" y="340" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="400" fill="white" opacity="0.55">Understand decentralized finance: AMMs, liquidity</text>
  <text x="60" y="368" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="400" fill="white" opacity="0.55">pools, stablecoins, and yield strategies.</text>

  <g font-family="Inter, system-ui, sans-serif" font-size="14" fill="white" opacity="0.4">
    <text x="60" y="440">10 Modules</text>
    <text x="165" y="440">·</text>
    <text x="180" y="440">Intermediate</text>
    <text x="300" y="440">·</text>
    <text x="315" y="440">Earn LRN</text>
  </g>

  <rect x="0" y="580" width="1200" height="50" fill="url(#accent)" opacity="0.06"/>
  <rect x="0" y="580" width="1200" height="1" fill="url(#accent)" opacity="0.3"/>
  <text x="60" y="612" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" opacity="0.4" letter-spacing="3">LEARNVAULT</text>
  <text x="1140" y="612" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="13" fill="white" opacity="0.25">learnvault.xyz</text>
</svg>
