version: '3.8'

services:
  app:
    build:
      context: .
      target: builder
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=postgresql://learnvault:learnvault@postgres:5432/learnvault?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - FRONTEND_URL=http://localhost:5173
    volumes:
      - .:/app
      # Exclude the host's node_modules by mounting an anonymous volume over it
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: learnvault
      POSTGRES_PASSWORD: learnvault
      POSTGRES_DB: learnvault
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learnvault -d learnvault"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
