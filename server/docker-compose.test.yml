version: '3.8'

services:
  app:
    build:
      context: .
      target: builder
    environment:
      - NODE_ENV=test
      - DATABASE_URL=postgresql://learnvault:learnvault@postgres:5432/learnvault_test?sslmode=disable
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npm run migrate && npm test"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: learnvault
      POSTGRES_PASSWORD: learnvault
      POSTGRES_DB: learnvault_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learnvault -d learnvault_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
