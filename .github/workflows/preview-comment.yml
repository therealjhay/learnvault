# Posts the Vercel front-end URL and optional staging API for each PR (same-repo only; forks skip).
name: Preview deployment comment

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-comment-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  comment-preview-url:
    if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    env:
      # Set in repo Settings → Secrets and variables → Actions (e.g. https://api.staging.learnvault.app)
      STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
    steps:
      - name: Wait for Vercel preview
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.1
        id: vercel_preview
        continue-on-error: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: Preview
          max_timeout: 300

      - name: Post preview environment comment
        if: steps.vercel_preview.outputs.url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fe = process.env.PREVIEW_URL
            const api = process.env.STAGING_API_URL?.trim() || ""
            const apiLine = api
              ? `**API (staging / shared backend):** ${api}\n\n`
              : `**API:** configure \`STAGING_API_URL\` in Actions secrets to show the staging or mock server here.\n\n`
            const body = `## Preview environment\n\n` +
              `**App (Vercel):** ${fe}\n\n` +
              apiLine +
              `> Stellar Testnet. Full isolated previews (dedicated API + database) are not provisioned in this job — wire your deployment to \`STAGING_API_URL\` and optional preview-specific secrets as needed.`
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            })
        env:
          PREVIEW_URL: ${{ steps.vercel_preview.outputs.url }}
          STAGING_API_URL: ${{ env.STAGING_API_URL }}

      - name: No Vercel URL yet
        if: steps.vercel_preview.outputs.url == ''
        run: echo "No Vercel preview found for this PR (check Vercel GitHub integration and Preview environment)."
